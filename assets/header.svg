<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C6FF"/>
      <stop offset="100%" stop-color="#0072FF"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0b3d91" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- 3D extrude layers -->
  <g font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-weight="700" font-size="44">
    <!-- Extrusion (multiple offset darker layers) -->
    <g fill="#042148" transform="translate(0,0)">
      <text x="60" y="120">👋 Hello, I'm Abhinav Mishra</text>
    </g>
    <g fill="#073a6b" transform="translate(4,4)">
      <text x="60" y="120">👋 Hello, I'm Abhinav Mishra</text>
    </g>
    <g fill="#0a66c2" transform="translate(8,8)">
      <text x="60" y="120">👋 Hello, I'm Abhinav Mishra</text>
    </g>

    <!-- Top text with gradient and shadow -->
    <g filter="url(#shadow)">
      <text x="60" y="120" fill="url(#grad)" font-size="48">👋 Hello, I'm Abhinav Mishra</text>
    </g>
  </g>

  <!-- Subtext -->
  <text x="60" y="165" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#333">Building. Debugging. Shipping.</text>
</svg>
